<template>
     <lightning-card title="Buscar endereço por CEP">
        <div class="slds-m-around_medium">
                <lightning-input type="text" label="CEP" onchange={handleCepChange}>     

                </lightning-input>

                <lightning-button variant="brand-outline" label="Buscar" onclick={handleBuscarCep}  >

                </lightning-button>


                <template if:true={endereco}>
                    <div class="slds-m-top_medium">
                         <lightning-input 
                         type="text" 
                         label="Logradouro" 
                         data-field="logradouro"
                         onchange={handleChangeEndereco}
                         value={endereco.logradouro}>
                         
                         </lightning-input>

                         <lightning-input 
                         type="text" 
                         label="Bairro" 
                         data-field="bairro"
                         onchange={handleChangeEndereco}
                         value={endereco.bairro}>
                         </lightning-input>

                         <lightning-input 
                         type="text" 
                         label="Cidade" 
                         data-field="localidade"
                         onchange={handleChangeEndereco}
                         value={endereco.localidade}>
                         </lightning-input>

                         <lightning-input 
                         type="text" 
                         label="Estado" 
                         data-field="estado"
                         onchange={handleChangeEndereco}
                         value={endereco.estado}>
                         </lightning-input>

                          <lightning-button variant="success" label="Salvar" onclick={handleSalvarEndereco}  >

                </lightning-button>
                    </div>
          </template>
         </div>
         

    </lightning-card>
</template>
